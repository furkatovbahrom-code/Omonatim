<!DOCTYPE html>
<html lang="uz">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Omonatim</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ccefff,#ffffff);
color:#333;
}

/* LOGIN */
#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#ccefff);
z-index:10;
}

.login-box{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.2);

width:85%;
max-width:280px;
margin:auto;

transition:0.3s;
}

.login-box input{
width:100%;
box-sizing:border-box;
padding:12px;
border:none;
border-radius:15px;
margin-top:10px;
transition:0.3s;
}

.login-box button{
margin-top:10px;
padding:10px;
border:none;
border-radius:20px;
background:#ff8fc7;
color:white;
cursor:pointer;
width:100%;
}

.login-box:hover{
transform:scale(1.05);
}

.login-box:focus-within{
transform:scale(1.08);
box-shadow:0 15px 50px rgba(0,0,0,0.25);
}

.login-box input{
padding:10px;
border:none;
border-radius:12px;
margin-top:10px;
width:100%;
transition:0.3s;
}

.login-box input:focus{
transform:scale(1.05);
outline:none;
box-shadow:0 0 10px rgba(255,150,200,0.5);
}

/* HEADER */
header{
text-align:center;
padding:30px 15px;
}

header h1{
font-size:32px;
color:#ff5fa2;
letter-spacing:2px;
}

/* NAV */
nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
}

nav button{
padding:10px 14px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ffb6d9,#8edcff);
color:white;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.grid img,.grid video{
width:100%;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* MEMORIES */
.memories{
padding:15px;
max-width:600px;
margin:auto;
}

.memory{
background:rgba(255,255,255,0.6);
padding:12px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
font-size:14px;
}

/* SECRET */
#secret{
display:none;
padding:20px;
text-align:center;
}

audio{
width:100%;
margin-top:10px;
}

/* RESPONSIVE */
@media (max-width:500px){

header h1{
font-size:26px;
}

.grid{
grid-template-columns:1fr;
}

nav button{
font-size:13px;
padding:8px 12px;
}

}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>🔐 Omonatim</h2>
<p>Parolni kiriting</p>
<input type="password" id="password">
<button onclick="checkPassword()">Kirish</button>
</div>
</div>

<header>
<h1>Omonatim</h1>
<p>Bizning xotiralarimiz</p>
</header>

<nav>
<button onclick="showSection('photos')">📷 Rasmlar</button>
<button onclick="showSection('videos')">🎥 Videolar</button>
<button onclick="showSection('voices')">🎤 Ovozlar</button>
<button onclick="showSection('memories')">📝 Xotiralar</button>
<button onclick="showSection('secret')">🔒 Maxfiy</button>
</nav>

<section id="photos" class="grid">
<img src="photo_2026-03-12_18-43-23.jpg">
<img src="photo_2026-03-12_18-43-23.jpg">
<img src="photo_2026-03-12_18-43-23.jpg">
<img src="photo_2026-03-12_18-43-23.jpg">
<img src="photo_2026-03-12_18-43-23.jpg">
</section>

<section id="videos" class="grid" style="display:none">
<video controls poster="photo_2026-03-12_18-43-23.jpg">
<source src="video_2026-03-12_19-06-11.mp4" type="video/mp4">
</video>
<video controls src="video_2026-03-12_19-06-11.mp4"></video>
<video controls src="video_2026-03-12_19-06-11.mp4"></video>
<video controls src="video_2026-03-12_19-06-11.mp4"></video>
<video controls src="video_2026-03-12_19-06-11.mp4"></video>
</section>

<section id="voices" class="memories" style="display:none">

<div class="memory">
<p>Bizning birinchi ovozli xotiramiz</p>
<audio controls src="voice1.mp3"></audio>
</div>

<div class="memory">
<p>Maxsus esdalik ovozi</p>
<audio controls src="voice2.mp3"></audio>
</div>

</section>

<section id="memories" class="memories" style="display:none">

<div class="memory">
Bugun juda yaxshi kun bo‘ldi. Birga kuldik va esdalik qoldi.
</div>

<div class="memory">
Hayotimizdagi eng chiroyli lahzalar shu yerda yoziladi.
</div>

</section>

<section id="secret">
<h2>🔒 Maxfiy sahifa</h2>
<p>Bu yer faqat biz uchun.</p>
</section>

<script>

function checkPassword(){
let pass=document.getElementById("password").value
if(pass==="1234"){
document.getElementById("login").style.display="none"
}else{
alert("Parol noto‘g‘ri")
}
}

function showSection(id){
document.getElementById("photos").style.display="none"
document.getElementById("videos").style.display="none"
document.getElementById("voices").style.display="none"
document.getElementById("memories").style.display="none"
document.getElementById("secret").style.display="none"

document.getElementById(id).style.display="block"

}

</script>

</body>
</html>
