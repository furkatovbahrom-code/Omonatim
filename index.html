<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Omonatim</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* LOGIN */
#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
z-index:10;
}

.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.login-box input{
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
}

.login-box button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

/* HEADER */
header{
text-align:center;
padding:40px 20px;
}

header h1{
font-size:40px;
letter-spacing:3px;
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
}

nav button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.grid img,.grid video{
width:100%;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* MEMORIES */
.memories{
padding:20px;
max-width:800px;
margin:auto;
}

.memory{
background:rgba(255,255,255,0.05);
padding:15px;
margin-bottom:15px;
border-radius:15px;
}

/* SECRET PAGE */
#secret{
display:none;
padding:40px;
text-align:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>🔐 Omonatim</h2>
<p>Parolni kiriting</p>
<input type="password" id="password">
<br>
<button onclick="checkPassword()">Kirish</button>
</div>
</div>

<header>
<h1>Omonatim</h1>
<p>Bizning xotiralarimiz</p>
</header>

<nav>
<button onclick="showSection('photos')">📷 Rasmlar</button>
<button onclick="showSection('videos')">🎥 Videolar</button>
<button onclick="showSection('memories')">📝 Xotiralar</button>
<button onclick="showSection('secret')">🔒 Maxfiy</button>
</nav>

<!-- PHOTOS -->
<section id="photos" class="grid">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</section>

<!-- VIDEOS -->
<section id="videos" class="grid" style="display:none">

<video controls src="video1.mp4"></video>
<video controls src="video2.mp4"></video>
<video controls src="video3.mp4"></video>
<video controls src="video4.mp4"></video>
<video controls src="video5.mp4"></video>

</section>

<!-- MEMORIES -->
<section id="memories" class="memories" style="display:none">

<div class="memory">
Bugun juda yaxshi kun bo‘ldi. Birga kuldik va esdalik qoldi.
</div>

<div class="memory">
Hayotimizdagi eng chiroyli lahzalar shu yerda yoziladi.
</div>

</section>

<!-- SECRET -->
<section id="secret">
<h2>🔒 Maxfiy sahifa</h2>
<p>Bu yer faqat biz uchun. Bu joyga maxfiy xotiralar yoziladi.</p>
</section>

<script>

function checkPassword(){
let pass=document.getElementById("password").value
if(pass==="1234"){
document.getElementById("login").style.display="none"
}else{
alert("Parol noto‘g‘ri")
}
}

function showSection(id){
document.getElementById("photos").style.display="none"
document.getElementById("videos").style.display="none"
document.getElementById("memories").style.display="none"
document.getElementById("secret").style.display="none"

document.getElementById(id).style.display="block"
}

</script>

</body>
</html>
